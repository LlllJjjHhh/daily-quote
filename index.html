<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Daily Quote</h1>
            <p class="subtitle">Get inspired every day</p>
        </header>

        <main>
            <div class="quote-card">
                <blockquote id="quote-text"></blockquote>
                <cite id="quote-author"></cite>
                <div class="actions">
                    <button id="copy-btn" title="Copy quote">📋 Copy</button>
                    <button id="new-quote-btn" title="New quote">🔄 New Quote</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Made with ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
